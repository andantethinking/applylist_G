<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의 자료실</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700;800&display=swap');
        
        body { font-family: 'Pretendard', sans-serif; background: #f8f9fa; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; }
        
        /* 제목 영역 스타일 */
        .title-area { margin-bottom: 30px; line-height: 1.2; }
        .title-year { font-size: 1.2rem; color: #888; font-weight: 600; }
        .title-main { font-size: 2.2rem; font-weight: 800; color: #222; margin: 5px 0; }
        .title-sub { font-size: 1.4rem; color: #555; font-weight: 600; }

        .search-area { margin-bottom: 20px; }
        #search { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .tab-area { margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 10px; }
        .tab-btn { 
            padding: 10px 20px; cursor: pointer; border: 2px solid transparent; 
            background: #fff; border-radius: 20px; transition: 0.3s; font-weight: 600; 
        }
        .tab-btn.active { color: #fff; }

        #cardGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { 
            background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            border-top: 6px solid #ccc; display: flex; flex-direction: column;
        }
        .card-header { font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #888; text-transform: uppercase; }
        .card-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 12px; color: #222; }
        .card-period { font-size: 0.9rem; color: #555; margin-bottom: 20px; flex-grow: 1; }
        .link-btn { 
            display: block; text-align: center; background: #333; color: #fff; 
            padding: 12px; border-radius: 6px; text-decoration: none; font-weight: 600; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title-area">
        <div class="title-year">2026</div>
        <div class="title-main">공공 AI 역량트랙 &<br>AI 챔피언 종합과정</div>
        <div class="title-sub">선발자 관리 시스템</div>
    </div>

    <div class="search-area">
        <input type="text" id="search" placeholder="과목명을 검색하세요...">
    </div>
    <div class="tab-area" id="tabContainer"></div>
    <div id="cardGrid"></div>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQXgzRCsEaPrED_IdV-LlDeZVVFXtCcm_QAjXaQDliNgwESXqu_lVxAwDO6c-Gxc5lCdVOyUirk57Q/pub?gid=0&single=true&output=csv";
    let fullData = [];
    const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#D4A5A5', '#9B59B6'];

    Papa.parse(csvUrl, {
        download: true, header: true, complete: function(results) {
            fullData = results.data.filter(r => r.차수);
            renderTabs();
            renderCards(fullData);
        }
    });

    function renderTabs() {
        const uniqueTabs = [...new Set(fullData.map(r => r.차수))];
        const container = document.getElementById('tabContainer');
        
        let html = `<button class="tab-btn active" style="border-color:#333; background:#333; color:#fff;" onclick="filterByTab('전체', this, '#333')">전체</button>`;
        
        html += uniqueTabs.map((t, i) => {
            const color = colors[i % colors.length];
            return `<button class="tab-btn" style="border-color:${color}; color:${color};" 
                    onclick="filterByTab('${t}', this, '${color}')">${t}</button>`;
        }).join('');
        
        container.innerHTML = html;
    }

    function renderCards(data) {
        const grid = document.getElementById('cardGrid');
        const uniqueTabs = [...new Set(fullData.map(r => r.차수))];
        
        grid.innerHTML = data.map((r) => {
            const colorIndex = uniqueTabs.indexOf(r.차수);
            const color = colors[colorIndex % colors.length];
            return `
                <div class="card" style="border-top-color: ${color}">
                    <div class="card-header">${r.차수}</div>
                    <div class="card-title">${r.과목}</div>
                    <div class="card-period">${r.기간 || '기간 정보 없음'}</div>
                    <a href="${r.링크}" class="link-btn" target="_blank" style="background-color:${color}">바로가기</a>
                </div>
            `;
        }).join('');
    }

    function filterByTab(tab, btn, color) {
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active');
            b.style.backgroundColor = '#fff';
        });
        btn.classList.add('active');
        btn.style.backgroundColor = color;
        
        const filtered = tab === '전체' ? fullData : fullData.filter(r => r.차수 === tab);
        renderCards(filtered);
    }

    document.getElementById('search').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        renderCards(fullData.filter(r => r.과목.toLowerCase().includes(val)));
    });
</script>
</body>
</html>
